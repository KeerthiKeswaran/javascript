<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="calculator">
        <!-- Semantic output for the result display -->
        <output class="display" id="display">0</output>

        <section class="buttons" id="button-grid">
            <!-- Data attributes used for clean logic separation in the module -->
            <button class="control" data-type="clear">C</button>
            <button class="operator" data-type="operator" data-value="/">/</button>
            <button class="operator" data-type="operator" data-value="*">&times;</button>
            <button class="control" data-type="delete">&larr;</button>

            <button data-type="number" data-value="7">7</button>
            <button data-type="number" data-value="8">8</button>
            <button data-type="number" data-value="9">9</button>
            <button class="operator" data-type="operator" data-value="-">&minus;</button>

            <button data-type="number" data-value="4">4</button>
            <button data-type="number" data-value="5">5</button>
            <button data-type="number" data-value="6">6</button>
            <button class="operator" data-type="operator" data-value="+">+</button>

            <button data-type="number" data-value="1">1</button>
            <button data-type="number" data-value="2">2</button>
            <button data-type="number" data-value="3">3</button>
            
            <button class="equals" data-type="calculate">=</button>

            <button class="zero" data-type="number" data-value="0">0</button>
            <button data-type="number" data-value=".">.</button>
        </section>
    </main>

    <!-- Load main logic as a module to support imports -->
    <script type="module" src="script.js"></script>
</body>
</html>
