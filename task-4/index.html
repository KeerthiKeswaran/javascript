<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>
        <div class="input-container">
            <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
            <button id="getWeatherBtn">Get Weather</button>
        </div>
        
        <div id="weatherDisplay" class="weather-info hidden">
            <h2 id="cityNameDisplay">City Name</h2>
            <p id="tempDisplay">Temperature: --°C</p>
            <p id="humidityDisplay">Humidity: --%</p>
            <p id="conditionDisplay">Condition: --</p>
        </div>
        
        <div id="errorDisplay" class="error-message hidden">
            <!-- Error messages will appear here -->
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
