<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>To Do List</h1>
    
    <div id="task-container">
        <!-- Tasks will be rendered here dynamically -->
    </div>

    <button class="add-btn" id="add-task-trigger">Add New Task</button>

    <div id="form-overlay" class="overlay">
        <form id="task-form">
            <h2>New Task</h2>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label for="task-name">Title</label>
                <input type="text" id="task-name" placeholder="What needs to be done?" required>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label for="task-description">Description</label>
                <input type="text" id="task-description" placeholder="Add more details (optional)">
            </div>

            <div class="form-actions">
                <button type="button" class="cancel-btn" id="close-form-btn">Cancel</button>
                <button type="submit" id="submit-btn">Add Task</button>
            </div>
        </form>
    </div>
</body>
</html>
